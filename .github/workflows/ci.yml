name: Continuous Integration

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        node-version: [18]
    steps:
      - uses: actions/checkout@v3
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 1.6.0
      - name: Run Biome
        run: biome ci ./src
